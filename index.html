<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIY Night Vision Camera</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden; /* Mencegah scrolling */
        }

        #camera {
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Membuat video memenuhi layar (full screen) */
            
            /* Efek Monokrom, Flipped Vertical (Y), dan Mirrored (X) */
            filter: grayscale(100%);
            transform: scale(-1, -1);
        }
    </style>
</head>
<body>

    <video id="camera" autoplay playsinline></video>

    <script>
        const videoElement = document.getElementById('camera');

        // Mengakses kamera belakang (environment) dengan resolusi tinggi
        const constraints = {
            video: {
                facingMode: 'environment', 
                width: { ideal: 1920 },
                height: { ideal: 1080 }
            }
        };

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = stream;
            } catch (err) {
                console.error("Gagal mengakses kamera: ", err);
                alert("Tidak dapat mengakses kamera. Pastikan izin kamera sudah diberikan di browser.");
            }
        }

        // Jalankan kamera saat halaman dimuat
        startCamera();
    </script>

</body>
</html>
