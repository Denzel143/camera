<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIY Night Vision HUD</title>
    <style>
        /* Reset margin & memastikan layar penuh */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace; /* Font gaya militer/teknologi */
        }

        /* --- PENGATURAN KAMERA --- */
        #camera-feed {
            position: absolute;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            filter: grayscale(100%); /* Efek monokrom tetap dipertahankan */
            z-index: 1;
        }

        /* Orientasi Potret: Flipped vertical & mirrored (horizontal) */
        @media (orientation: portrait) {
            #camera-feed { transform: scale(-1, -1); }
        }

        /* Orientasi Lanskap: Normal */
        @media (orientation: landscape) {
            #camera-feed { transform: none; }
        }


        /* --- PENGATURAN HUD (HEAD-UP DISPLAY) --- */
        #hud-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none; /* Agar overlay tidak menghalangi sentuhan ke layar */
            color: rgba(0, 255, 0, 0.8); /* Warna hijau neon khas NVG */
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.8);
        }

        /* Efek Vignette (gelap di pinggir layar seperti lensa) */
        .vignette {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            box-shadow: inset 0 0 120px rgba(0,0,0,0.9);
        }

        /* Crosshair Tengah */
        .crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            border: 2px solid rgba(0, 255, 0, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.4), inset 0 0 10px rgba(0, 255, 0, 0.4);
        }
        .crosshair::before {
            content: ''; position: absolute;
            top: 50%; left: -30px; right: -30px;
            height: 2px; background: rgba(0, 255, 0, 0.6);
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.8);
        }
        .crosshair::after {
            content: ''; position: absolute;
            left: 50%; top: -30px; bottom: -30px;
            width: 2px; background: rgba(0, 255, 0, 0.6);
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.8);
        }

        /* Sudut Bingkai HUD */
        .corner {
            position: absolute;
            width: 40px; height: 40px;
            border-color: rgba(0, 255, 0, 0.8);
            border-style: solid;
            box-shadow: 0 0 8px rgba(0,255,0,0.5);
        }
        .top-left { top: 30px; left: 30px; border-width: 4px 0 0 4px; }
        .top-right { top: 30px; right: 30px; border-width: 4px 4px 0 0; }
        .bottom-left { bottom: 30px; left: 30px; border-width: 0 0 4px 4px; }
        .bottom-right { bottom: 30px; right: 30px; border-width: 0 4px 4px 0; }

        /* Teks Indikator */
        .hud-text {
            position: absolute;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .text-top-left { top: 40px; left: 80px; }
        .text-top-right { top: 40px; right: 80px; }
        .text-bottom-left { bottom: 40px; left: 80px; }
        .text-bottom-right { bottom: 40px; right: 80px; text-align: right;}

        /* Animasi berkedip untuk indikator REC */
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .rec-dot {
            color: red;
            text-shadow: 0 0 8px red;
            animation: blink 1.5s infinite;
        }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay playsinline></video>

    <div id="hud-overlay">
        <div class="vignette"></div>
        <div class="crosshair"></div>
        
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>

        <div class="hud-text text-top-left">
            <span class="rec-dot">●</span> REC
        </div>
        <div class="hud-text text-top-right">
            IR: ON<br>NVG-M1
        </div>
        <div class="hud-text text-bottom-left">
            LAT: 06°58'S<br>LON: 110°25'E
        </div>
        <div class="hud-text text-bottom-right" id="clock">
            00:00:00
        </div>
    </div>

    <script>
        // Akses Kamera
        const video = document.getElementById('camera-feed');
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' }
        })
        .then(stream => { video.srcObject = stream; })
        .catch(err => {
            console.error("Gagal mengakses kamera:", err);
            alert("Tidak dapat mengakses kamera.");
        });

        // Jam Digital HUD agar terlihat hidup
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('id-ID', { hour12: false });
            document.getElementById('clock').innerText = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock(); // Panggil sekali agar langsung muncul
    </script>
</body>
</html>
